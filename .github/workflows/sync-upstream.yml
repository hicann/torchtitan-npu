name: Sync Upstream

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print commands without pushing)"
        type: boolean
        default: false
  schedule:
    - cron: "0 14 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://gitcode.com/cann/torchtitan-npu.git
          git fetch upstream --tags
          git fetch upstream '+refs/heads/*:refs/remotes/upstream/*'

      - name: List upstream branches
        run: |
          echo "=== Upstream branches ==="
          git branch -r --list 'upstream/*' --format='%(refname:lstrip=3)' | grep -v HEAD

      - name: Sync all branches
        run: |
          for branch in $(git branch -r --list 'upstream/*' --format='%(refname:lstrip=3)' | grep -v HEAD); do
            echo "Syncing $branch..."
            if [[ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run }}" == "true" ]]; then
              echo "  [DRY RUN] git push origin refs/remotes/upstream/$branch:refs/heads/$branch --force-with-lease"
            else
              git push origin "refs/remotes/upstream/$branch:refs/heads/$branch" --force-with-lease
            fi
          done

      - name: Push tags
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: git push origin --tags
